<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Tin Học 7 - TH&THCS Thái Giang</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .school-info {
            background: #f8f9fa;
            padding: 15px 30px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .school-name {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }

        .teacher-name {
            font-size: 16px;
            color: #7f8c8d;
        }

        .copyright {
            font-size: 14px;
            color: #95a5a6;
            font-style: italic;
        }

        .exam-selector {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .exam-selector select {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            width: 300px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
        }

        .exam-selector select:hover {
            border-color: #3498db;
        }

        .exam-stats {
            display: flex;
            gap: 20px;
            padding: 15px 30px;
            background: #e8f4f8;
            border-radius: 10px;
            margin: 0 30px 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-label {
            font-weight: 600;
            color: #2c3e50;
        }

        .stat-value {
            background: #3498db;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .question-panel {
            padding: 20px 30px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
            margin: 20px 0 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #3498db;
        }

        .question-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #3498db;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .question-text {
            font-size: 16px;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            border-color: #3498db;
            background: #ebf5ff;
        }

        .option input[type="radio"] {
            margin-right: 10px;
            cursor: pointer;
        }

        .option.selected {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .option.selected input[type="radio"] {
            accent-color: white;
        }

        .true-false-options {
            display: flex;
            gap: 20px;
        }

        .tf-option {
            flex: 1;
        }

        .fill-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .fill-input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .action-buttons {
            padding: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        .btn-info {
            background: #f39c12;
            color: white;
        }

        .btn-info:hover {
            background: #e67e22;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }

        .btn-warning {
            background: #e74c3c;
            color: white;
        }

        .btn-warning:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .result-panel {
            margin: 20px 30px 30px;
            padding: 25px;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            border-radius: 15px;
            color: white;
        }

        .score-display {
            text-align: center;
        }

        .score-number {
            font-size: 60px;
            font-weight: 700;
            line-height: 1.2;
        }

        .score-detail {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 24px;
            font-weight: 600;
        }

        .answers-panel {
            padding: 0 30px 30px;
        }

        .answer-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #27ae60;
        }

        .answer-item.incorrect {
            border-left-color: #e74c3c;
        }

        .answer-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .user-answer {
            color: #2c3e50;
        }

        .correct-answer {
            color: #27ae60;
        }

        .incorrect .correct-answer {
            color: #e74c3c;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .options {
                grid-template-columns: 1fr;
            }
            
            .true-false-options {
                flex-direction: column;
            }
            
            .exam-selector select {
                width: 100%;
            }
            
            .school-info {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>HỆ THỐNG TRẮC NGHIỆM TIN HỌC 7</h1>
            <p>TRƯỜNG TH&THCS THÁI GIANG</p>
        </div>

        <div class="school-info">
            <div class="school-name">Trường TH&THCS Thái Giang</div>
            <div class="teacher-name">GV: Hoàng Anh Dũng</div>
            <div class="copyright">Bản quyền của GV: Hoàng Anh Dũng</div>
        </div>

        <div class="exam-selector">
            <select id="examSelect">
                <option value="0">ĐỀ 1</option>
                <option value="1">ĐỀ 2</option>
                <option value="2">ĐỀ 3</option>
                <option value="3">ĐỀ 4</option>
                <option value="4">ĐỀ 5</option>
                <option value="5">ĐỀ 6</option>
            </select>
            <div style="margin-left: auto; color: #7f8c8d;">
                <span>📊 24 câu / đề</span>
            </div>
        </div>

        <div class="exam-stats">
            <div class="stat-item">
                <span class="stat-label">Tổng số câu:</span>
                <span class="stat-value" id="totalQuestions">24</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Đã làm:</span>
                <span class="stat-value" id="answeredCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Còn lại:</span>
                <span class="stat-value" id="remainingCount">24</span>
            </div>
        </div>

        <div id="questionsContainer" class="question-panel"></div>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="submitExam()">📝 Nộp bài</button>
            <button class="btn btn-success" onclick="showAnswers()">🔍 Xem đáp án</button>
            <button class="btn btn-info" onclick="resetExam()">🔄 Làm lại</button>
            <button class="btn btn-warning" onclick="clearAll()">🗑️ Xóa hết</button>
        </div>

        <div id="resultPanel" class="result-panel hidden">
            <div class="score-display">
                <div class="score-number" id="score">0/24</div>
                <div class="score-detail">
                    <div class="detail-item">
                        <div class="detail-label">Đúng</div>
                        <div class="detail-value" id="correctCount">0</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Sai</div>
                        <div class="detail-value" id="wrongCount">0</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Chưa làm</div>
                        <div class="detail-value" id="unansweredCount">24</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="answersPanel" class="answers-panel hidden"></div>
    </div>

    <script>
        // Dữ liệu đề thi từ đề 1 đến đề 6
        const examData = [

        let currentExam = 0;
        let userAnswers = {};
        let submitted = false;

        function loadExam(examIndex) {
            currentExam = examIndex;
            userAnswers = {};
            submitted = false;
            renderQuestions();
            updateStats();
            document.getElementById('resultPanel').classList.add('hidden');
            document.getElementById('answersPanel').classList.add('hidden');
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            const exam = examData[currentExam];
            let html = '';

            // Phần I: Chọn đáp án đúng nhất (Câu 1-12)
            html += '<div class="section-title">Phần I -- Chọn đáp án đúng nhất</div>';
            for (let i = 0; i < 12; i++) {
                html += renderQuestion(i, exam.questions[i]);
            }

            // Phần II: Đúng/Sai (Câu 13-20)
            html += '<div class="section-title">Phần II -- Đúng/Sai</div>';
            for (let i = 12; i < 20; i++) {
                html += renderQuestion(i, exam.questions[i]);
            }

            // Phần III: Điền khuyết (Câu 21-24)
            html += '<div class="section-title">Phần III -- Điền khuyết</div>';
            for (let i = 20; i < 24; i++) {
                html += renderQuestion(i, exam.questions[i]);
            }

            container.innerHTML = html;
        }

            let answer = userAnswers[index] || '';
            
            if (question.type === 'multiple') {
                return `
                    <div class="question-item" id="q-${index}">
                        <div class="question-text">${question.text}</div>
                        <div class="options">
                            ${question.options.map((opt, optIndex) => `
                                <label class="option ${answer == optIndex ? 'selected' : ''}">
                                    <input type="radio" name="q-${index}" value="${optIndex}" 
                                        ${answer == optIndex ? 'checked' : ''} 
                                        onchange="saveAnswer(${index}, ${optIndex})">
                                    ${opt}
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (question.type === 'tf') {
                return `
                    <div class="question-item" id="q-${index}">
                        <div class="question-text">${question.text}</div>
                        <div class="true-false-options">
                            ${question.options.map((opt, optIndex) => `
                                <label class="option tf-option ${answer == optIndex ? 'selected' : ''}">
                                    <input type="radio" name="q-${index}" value="${optIndex}" 
                                        ${answer == optIndex ? 'checked' : ''} 
                                        onchange="saveAnswer(${index}, ${optIndex})">
                                    ${opt}
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="question-item" id="q-${index}">
                        <div class="question-text">${question.text}</div>
                        <input type="text" class="fill-input" 
                            value="${answer}" 
                            onchange="saveAnswer(${index}, this.value)"
                            placeholder="Nhập đáp án của bạn...">
                    </div>
                `;
            }
        }

        function saveAnswer(index, value) {
            userAnswers[index] = value;
            updateStats();
            
            if (typeof value === 'number') {
                const radios = document.getElementsByName(`q-${index}`);
                radios.forEach((radio, i) => {
                    const label = radio.closest('.option');
                    if (label) {
                        if (i == value) {
                            label.classList.add('selected');
                        } else {
                            label.classList.remove('selected');
                        }
                    }
                });
            }
        }

        function updateStats() {
            const answered = Object.keys(userAnswers).length;
            document.getElementById('answeredCount').textContent = answered;
            document.getElementById('remainingCount').textContent = 24 - answered;
        }

        function submitExam() {
            const exam = examData[currentExam];
            let correct = 0;
            let wrong = 0;
            let unanswered = 0;

            for (let i = 0; i < 24; i++) {
                const question = exam.questions[i];
                const userAnswer = userAnswers[i];
                
                if (userAnswer === undefined || userAnswer === '') {
                    unanswered++;
                } else {
                    let isCorrect = false;
                    if (question.type === 'fill') {
                        isCorrect = userAnswer.toString().toLowerCase().trim() === question.correct.toLowerCase().trim();
                    } else {
                        isCorrect = parseInt(userAnswer) === question.correct;
                    }
                    
                    if (isCorrect) {
                        correct++;
                    } else {
                        wrong++;
                    }
                }
            }

            document.getElementById('score').textContent = `${correct}/24`;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('unansweredCount').textContent = unanswered;
            
            document.getElementById('resultPanel').classList.remove('hidden');
            submitted = true;
        }

        function showAnswers() {
            if (!submitted) {
                alert('Vui lòng nộp bài trước khi xem đáp án!');
                return;
            }

            const exam = examData[currentExam];
            const answersPanel = document.getElementById('answersPanel');
            let html = '<div class="section-title">ĐÁP ÁN CHI TIẾT</div>';

            for (let i = 0; i < 24; i++) {
                const question = exam.questions[i];
                const userAnswer = userAnswers[i];
                let isCorrect = false;
                let correctAnswer = '';
                let userAnswerText = 'Chưa làm';

                if (question.type === 'fill') {
                    correctAnswer = question.correct;
                    if (userAnswer !== undefined && userAnswer !== '') {
                        userAnswerText = userAnswer;
                        isCorrect = userAnswer.toString().toLowerCase().trim() === question.correct.toLowerCase().trim();
                    }
                } else {
                    correctAnswer = question.options[question.correct];
                    if (userAnswer !== undefined) {
                        userAnswerText = question.options[parseInt(userAnswer)];
                        isCorrect = parseInt(userAnswer) === question.correct;
                    }
                }

                html += `
                    <div class="answer-item ${userAnswer !== undefined && !isCorrect ? 'incorrect' : ''}">
                        <div class="answer-header">
                            <span>Câu ${i + 1}</span>
                            <span>${userAnswer === undefined || userAnswer === '' ? 'Chưa làm' : (isCorrect ? 'Đúng' : 'Sai')}</span>
                        </div>
                        <div class="user-answer">Câu trả lời của bạn: ${userAnswerText}</div>
                        <div class="correct-answer">Đáp án đúng: ${correctAnswer}</div>
                    </div>
                `;
            }

            answersPanel.innerHTML = html;
            answersPanel.classList.remove('hidden');
        }

        function resetExam() {
            if (confirm('Bạn có chắc muốn làm lại bài thi này?')) {
                userAnswers = {};
                submitted = false;
                renderQuestions();
                updateStats();
                document.getElementById('resultPanel').classList.add('hidden');
                document.getElementById('answersPanel').classList.add('hidden');
            }
        }

        function clearAll() {
            if (confirm('Bạn có chắc muốn xóa hết câu trả lời?')) {
                userAnswers = {};
                renderQuestions();
                updateStats();
            }
        }

        document.getElementById('examSelect').addEventListener('change', (e) => {
            loadExam(parseInt(e.target.value));
        });

        loadExam(0);
    </script>
</body>
</html>
